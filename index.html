<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouldering Tracker</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2, h3 { text-align: center; }

        /* Form Styles */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .checkbox-group { display: flex; align-items: center; gap: 10px; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background: #218838; }

        /* Message Box */
        #message { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; text-align: center; font-weight: bold; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        /* Logbook Styles */
        hr { border: 0; height: 1px; background: #ddd; margin: 30px 0; }
        .climb-card { background: #fafafa; border-left: 5px solid #ccc; padding: 15px; margin-bottom: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center;}
        .climb-card.sent { border-left-color: #28a745; } /* Green border for sends */
        .climb-card.project { border-left-color: #ffc107; } /* Yellow border for projects */
        .climb-info { display: flex; flex-direction: column; gap: 5px; }
        .climb-name { font-size: 18px; font-weight: bold; }
        .climb-status { font-size: 14px; font-weight: bold; padding: 4px 8px; border-radius: 12px; }
        .status-sent { background: #d4edda; color: #155724; }
        .status-project { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>

<div class="container">
    <h2>Log a Climb</h2>

    <form id="climbForm">
        <div class="form-group">
            <label for="name">Route Name</label>
            <input type="text" id="name" required placeholder="e.g., Midnight Lightning">
        </div>

        <div class="form-group">
            <label for="grade">Grade</label>
            <input type="text" id="grade" required placeholder="e.g., V8">
        </div>

        <div class="form-group checkbox-group">
            <input type="checkbox" id="is_sent">
            <label for="is_sent" style="margin: 0;">I sent it!</label>
        </div>

        <button type="submit">Log Attempt / Send</button>
    </form>

    <div id="message"></div>

    <hr>

    <h3>My Logbook</h3>
    <div id="logbook"></div>

</div>

<script>
    const form = document.getElementById('climbForm');
    const messageBox = document.getElementById('message');
    const logbook = document.getElementById('logbook');

    // --- NEW: Function to Fetch and Display Climbs ---
    async function fetchClimbs() {
        try {
            // 1. Ask FastAPI for the data (Defaults to GET method)
            const response = await fetch('http://127.0.0.1:8000/climbs/');
            const climbs = await response.json();

            // 2. Clear out the current HTML list so we don't duplicate it
            logbook.innerHTML = '';

            // 3. Loop through the array of climbs we got back
            climbs.forEach(climb => {
                // Determine styling based on whether it is sent
                const statusClass = climb.is_sent ? 'sent' : 'project';
                const statusText = climb.is_sent ? 'Sent ✅' : 'Project ⏳';
                const statusBadge = climb.is_sent ? 'status-sent' : 'status-project';

                // Create the HTML card for this specific climb
                const climbCard = `
                    <div class="climb-card ${statusClass}">
                        <div class="climb-info">
                            <span class="climb-name">${climb.name}</span>
                            <span>Grade: ${climb.grade}</span>
                        </div>
                        <div class="climb-status ${statusBadge}">
                            ${statusText}
                        </div>
                    </div>
                `;

                // Inject the card into the logbook div
                logbook.innerHTML += climbCard;
            });

            // If the database is empty, show a friendly message
            if (climbs.length === 0) {
                logbook.innerHTML = '<p style="text-align:center; color:#777;">Your logbook is empty. Go climb!</p>';
            }

        } catch (error) {
            logbook.innerHTML = '<p style="color:red; text-align:center;">Could not load climbs. Is the server running?</p>';
        }
    }

    // --- EXISTING: Form Submit Logic ---
    form.addEventListener('submit', async function(event) {
        event.preventDefault();

        const climbData = {
            name: document.getElementById('name').value,
            grade: document.getElementById('grade').value,
            is_sent: document.getElementById('is_sent').checked
        };

        try {
            const response = await fetch('http://127.0.0.1:8000/climbs/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(climbData)
            });

            const responseData = await response.json();

            if (response.ok) {
                showMessage(`Success! Logged ID: ${responseData.id}`, 'success');
                form.reset();

                // NEW: Refresh the logbook immediately after logging a new climb!
                fetchClimbs();

            } else {
                showMessage(`Error: ${responseData.detail}`, 'error');
            }
        } catch (error) {
            showMessage("Error: Could not connect to the server.", 'error');
        }
    });

    function showMessage(text, type) {
        messageBox.textContent = text;
        messageBox.className = type;
        messageBox.style.display = 'block';
        setTimeout(() => { messageBox.style.display = 'none'; }, 4000);
    }

    // --- NEW: Call fetchClimbs the moment the page loads! ---
    fetchClimbs();
</script>

</body>
</html>
