<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Bouldering Tracker</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container auth-container">
        <h2>Join the Gym</h2>
        <form id="signupForm">
            <div class="form-group">
                <label for="user_name">Username</label>
                <input type="text" id="user_name" required placeholder="yartym">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="yurii@42.fr">
            </div>
            <div class="form-group">
				<label for="password">Password</label>
				<input type="password" id="password" required
					maxlength="72"
					placeholder="Minimum 8 characters">
            </div>
            <button type="submit">Create Account</button>
        </form>
        <p class="auth-switch">Already have an account? <a href="/static/login.html">Login</a></p>
        <div id="message"></div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userData = {
                user_name: document.getElementById('user_name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            const response = await fetch('/users/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });

            if (response.ok) {
                alert("Account created! Please login.");
                window.location.href = '/static/login.html';
            } else {
                const data = await response.json();
                document.getElementById('message').textContent = data.detail;
            }
        });
    </script>
</body>
</html>
