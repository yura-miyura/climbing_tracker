<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouldering Tracker</title>
    <link rel="shortcut icon" href="/images/favicon.ico" type="image/ico">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body onload="checkAuth(); loadGrades();"> <div class="container">
    <header class="auth-header">
        <div id="auth-links">
            <a href="/static/login.html" class="auth-btn">Login</a>
            <a href="/static/signup.html" class="auth-btn">Sign Up</a>
        </div>
        <div id="user-profile" style="display: none;">
            <span id="welcome-msg">Welcome, Climber!</span>
            <button onclick="logout()" class="logout-btn">Logout</button>
        </div>
    </header>

    <h2>Log a Climb</h2>

    <form id="climbForm">
        <div class="form-group">
            <label for="name">Route Name</label>
            <input type="text" id="name" required placeholder="e.g., Midnight Lightning">
        </div>

        <div class="form-group">
            <label for="gradeType">Style</label>
            <select id="gradeType" onchange="loadGrades()">
                <option value="bouldering">Bouldering (V-Scale)</option>
                <option value="sport">Sport (French/YDS)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="grade_id">Grade</label>
            <select id="grade_id" required>
                <option value="">Loading grades...</option>
            </select>
        </div>

        <div class="form-group checkbox-group">
            <input type="checkbox" id="is_sent">
            <label for="is_sent" style="margin: 0;">I sent it! ✅</label>
        </div>

        <button type="submit" id="submitBtn">Log Attempt / Send</button>
    </form>

    <div id="message"></div>
    <hr>

    <div class="filter-controls">
        <button id="btnAll" class="filter-btn active">All My Climbs</button>
        <button id="btnSent" class="filter-btn">Sent Only ✅</button>
    </div>

    <h3>My Logbook</h3>
    <div id="logbook"></div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
