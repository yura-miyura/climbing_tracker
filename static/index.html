<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bouldering Tracker</title>
	<link rel="shortcut icon" href="/images/favicon.ico" type="image/ico">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h2>Log a Climb</h2>
    <form id="climbForm">
        <div class="form-group">
            <label for="name">Route Name</label>
            <input type="text" id="name" required placeholder="e.g., Midnight Lightning">
        </div>
        <div class="form-group">
            <label for="grade">Grade</label>
            <input type="text" id="grade" required placeholder="e.g., V8">
        </div>
        <div class="form-group checkbox-group">
            <input type="checkbox" id="is_sent">
            <label for="is_sent" style="margin: 0;">I sent it!</label>
        </div>
        <button type="submit">Log Attempt / Send</button>
    </form>

    <div id="message"></div>
    <hr>

    <div class="filter-controls">
        <button id="btnAll" class="filter-btn active">All Climbs</button>
        <button id="btnSent" class="filter-btn">Sent Only ✅</button>
    </div>

    <h3>My Logbook</h3>
    <div id="logbook"></div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
